<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 530" width="1700" height="530">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrow-skip" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#999"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1700" height="530" fill="#ffffff"/>

  <!-- Title -->
  <text x="850" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#222">CNN + Mamba Encoder (ProtoNet)</text>

  <!-- ============================================================ -->
  <!-- 1. INPUT BLOCK  x=30..125 -->
  <!-- ============================================================ -->
  <rect x="30" y="195" width="95" height="50" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="77" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">Input</text>
  <text x="77" y="234" text-anchor="middle" font-size="10" fill="#555">(204 × 5)</text>
  <text x="77" y="268" text-anchor="middle" font-size="9" fill="#aaa">204×5</text>

  <!-- Arrow: Input → Conv1D-128 -->
  <line x1="125" y1="220" x2="173" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- 2. CONV1D-128  x=176..288 -->
  <!-- ============================================================ -->
  <rect x="176" y="188" width="112" height="64" rx="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="232" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Conv 1D</text>
  <text x="232" y="224" text-anchor="middle" font-size="10" fill="#555">128 filters</text>
  <text x="232" y="240" text-anchor="middle" font-size="9" fill="#888">k=7, LeakyReLU</text>
  <text x="232" y="275" text-anchor="middle" font-size="9" fill="#aaa">204×128</text>

  <!-- Arrow: Conv1D-128 → Conv1D-256  gap=68px -->
  <line x1="288" y1="220" x2="353" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="210" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">MaxPool(2)</text>
  <text x="320" y="237" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">LayerNorm</text>

  <!-- ============================================================ -->
  <!-- 3. CONV1D-256  x=356..468 -->
  <!-- ============================================================ -->
  <rect x="356" y="188" width="112" height="64" rx="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="412" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Conv 1D</text>
  <text x="412" y="224" text-anchor="middle" font-size="10" fill="#555">256 filters</text>
  <text x="412" y="240" text-anchor="middle" font-size="9" fill="#888">k=5, LeakyReLU</text>
  <text x="412" y="275" text-anchor="middle" font-size="9" fill="#aaa">102×256</text>

  <!-- Arrow: Conv1D-256 → Mamba region  gap=62px -->
  <line x1="468" y1="220" x2="527" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="497" y="210" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">MaxPool(2)</text>
  <text x="497" y="237" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">LayerNorm</text>

  <!-- ============================================================ -->
  <!-- 4. MAMBA RESIDUAL BLOCK  x=522..782  (w=260) -->
  <!-- ============================================================ -->
  <rect x="522" y="120" width="260" height="210" rx="12" fill="#FFF8E1" stroke="#FFA726" stroke-width="1.8" stroke-dasharray="7,3"/>
  <text x="652" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#E65100">Mamba Residual Block</text>

  <!-- Split point at x=537 -->
  <!-- Branch 1: up to Mamba SSM -->
  <line x1="537" y1="220" x2="537" y2="192" stroke="#444" stroke-width="1.3"/>
  <line x1="537" y1="192" x2="565" y2="192" stroke="#444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Mamba SSM inner block  x=568..738 -->
  <rect x="568" y="164" width="170" height="58" rx="8" fill="#FFE0B2" stroke="#FB8C00" stroke-width="1.5"/>
  <text x="653" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#E65100">Stable Mamba</text>
  <text x="653" y="199" text-anchor="middle" font-size="9.5" fill="#555">d_model=256, d_state=32</text>
  <text x="653" y="214" text-anchor="middle" font-size="9" fill="#888">d_conv=4, expand=2</text>

  <!-- Arrow: Mamba → Add -->
  <line x1="653" y1="222" x2="653" y2="254" stroke="#444" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Add block  x=597..709 -->
  <rect x="597" y="258" width="112" height="38" rx="6" fill="#E8EAF6" stroke="#7986CB" stroke-width="1.3"/>
  <text x="653" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#303F9F">Add (⊕)</text>
  <text x="653" y="290" text-anchor="middle" font-size="8.5" fill="#777">Skip Connection</text>

  <!-- Branch 2: skip connection (dashed) -->
  <line x1="537" y1="220" x2="537" y2="277" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3"/>
  <line x1="537" y1="277" x2="595" y2="277" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-skip)"/>

  <!-- Shape annotation under Mamba region -->
  <text x="537" y="350" text-anchor="middle" font-size="9" fill="#aaa">51×256</text>

  <!-- Arrow: Add → exit to right -->
  <line x1="709" y1="277" x2="782" y2="277" stroke="#444" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- Connector: bend up from Mamba exit → Conv1D(k=3) -->
  <!-- Bend at x=820, Conv starts at x=890  -->
  <!-- ============================================================ -->
  <line x1="782" y1="277" x2="820" y2="277" stroke="#444" stroke-width="1.5"/>
  <line x1="820" y1="277" x2="820" y2="220" stroke="#444" stroke-width="1.5"/>
  <line x1="820" y1="220" x2="888" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- LayerNorm text positioned to the right of the bend, centered in the gap -->
  <text x="855" y="255" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">LayerNorm</text>

  <!-- ============================================================ -->
  <!-- 5. CONV1D-256 (k=3)  x=890..1002 -->
  <!-- ============================================================ -->
  <rect x="890" y="188" width="112" height="64" rx="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="946" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#1565C0">Conv 1D</text>
  <text x="946" y="224" text-anchor="middle" font-size="10" fill="#555">256 filters</text>
  <text x="946" y="240" text-anchor="middle" font-size="9" fill="#888">k=3, LeakyReLU</text>
  <text x="946" y="275" text-anchor="middle" font-size="9" fill="#aaa">51×256</text>

  <!-- Arrow: Conv1D(k=3) → FC 128  gap=88px -->
  <line x1="1002" y1="220" x2="1088" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1045" y="210" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">MaxPool(2)</text>
  <text x="1045" y="237" text-anchor="middle" font-size="8.5" fill="#777" font-style="italic">Flatten</text>

  <!-- ============================================================ -->
  <!-- 6. FC LAYER (Dense 128)  x=1090..1202 -->
  <!-- ============================================================ -->
  <rect x="1090" y="188" width="112" height="64" rx="8" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="1146" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#7B1FA2">FC Layer</text>
  <text x="1146" y="224" text-anchor="middle" font-size="10" fill="#555">128 units</text>
  <text x="1146" y="240" text-anchor="middle" font-size="9" fill="#888">LeakyReLU</text>
  <text x="1146" y="275" text-anchor="middle" font-size="9" fill="#aaa">128</text>

  <!-- Arrow: FC 128 → FC 64  gap=60px -->
  <line x1="1202" y1="220" x2="1260" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- 7. FC LAYER (Dense 64)  x=1262..1374 -->
  <!-- ============================================================ -->
  <rect x="1262" y="188" width="112" height="64" rx="8" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="1318" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#7B1FA2">FC Layer</text>
  <text x="1318" y="224" text-anchor="middle" font-size="10" fill="#555">64 units</text>
  <text x="1318" y="240" text-anchor="middle" font-size="9" fill="#888">Linear</text>
  <text x="1318" y="275" text-anchor="middle" font-size="9" fill="#aaa">64</text>

  <!-- Arrow: FC 64 → L2 Norm  gap=60px -->
  <line x1="1374" y1="220" x2="1432" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- 8. L2 NORMALIZE OUTPUT  x=1434..1559 -->
  <!-- ============================================================ -->
  <rect x="1434" y="195" width="125" height="50" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="1496" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#2E7D32">L2 Normalize</text>
  <text x="1496" y="233" text-anchor="middle" font-size="10" fill="#555">Embedding</text>
  <text x="1496" y="268" text-anchor="middle" font-size="9" fill="#aaa">64-d</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="30" y="380" width="1640" height="130" rx="10" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
  <text x="850" y="405" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Legend</text>

  <!-- Row 1 -->
  <rect x="80" y="420" width="22" height="16" rx="4" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
  <text x="112" y="433" font-size="11" fill="#444">Conv 1D Layer</text>

  <rect x="340" y="420" width="22" height="16" rx="4" fill="#FFE0B2" stroke="#FB8C00" stroke-width="1"/>
  <text x="372" y="433" font-size="11" fill="#444">Stable Mamba Block (SSM)</text>

  <rect x="660" y="420" width="22" height="16" rx="4" fill="#F3E5F5" stroke="#AB47BC" stroke-width="1"/>
  <text x="692" y="433" font-size="11" fill="#444">Fully Connected Layer</text>

  <rect x="960" y="420" width="22" height="16" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="992" y="433" font-size="11" fill="#444">Input / Output</text>

  <rect x="1200" y="420" width="22" height="16" rx="4" fill="#E8EAF6" stroke="#7986CB" stroke-width="1"/>
  <text x="1232" y="433" font-size="11" fill="#444">Skip Add</text>

  <!-- Row 2 -->
  <line x1="80" y1="465" x2="120" y2="465" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="132" y="469" font-size="11" fill="#444">Data flow</text>

  <line x1="340" y1="465" x2="380" y2="465" stroke="#999" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-skip)"/>
  <text x="392" y="469" font-size="11" fill="#444">Skip / Residual connection</text>

  <text x="660" y="469" font-size="10.5" fill="#777" font-style="italic">Italic text on arrows</text>
  <text x="845" y="469" font-size="11" fill="#444">= intermediate operations (MaxPool, LayerNorm, Flatten)</text>

  <!-- Architecture summary -->
  <text x="850" y="498" text-anchor="middle" font-size="9.5" fill="#bbb">Architecture: Input(204×5) → Conv1D(128,k=7) → MaxPool → LN → Conv1D(256,k=5) → MaxPool → LN → MambaBlock(256) → LN → Conv1D(256,k=3) → MaxPool → Flatten → Dense(128) → Dense(64) → L2Norm</text>

</svg>
